<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家計簿 — Kakeibo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2ECE1;
    --paper-line:#E3DACB;
    --ink:#2B2A28;
    --ink-soft:#5B5750;
    --indigo:#2F4858;
    --hanko:#B23A1D;
    --sage:#6E7A5E;
    --card:#FFFDF8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, var(--paper-line) 28px);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    padding:28px 20px 18px;
    text-align:center;
    position:relative;
  }
  header h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:28px;
    margin:0;
    color:var(--ink);
  }
  header .sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:6px;
  }
  .wrap{max-width:480px; margin:0 auto; padding:0 16px;}

  .summary{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
  }
  .sum-card{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:4px;
    padding:14px 16px;
  }
  .sum-card .label{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .sum-card .value{
    font-family:'Shippori Mincho', serif;
    font-size:22px;
    font-weight:700;
    margin-top:4px;
  }
  .sum-card.total{grid-column:1 / -1; background:var(--indigo); color:var(--paper);}
  .sum-card.total .label{color:#C9D6DC;}
  .sum-card.total .value{color:#fff; font-size:30px;}

  .cats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:20px;
  }
  .cat-chip{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:4px;
    padding:8px 4px;
    text-align:center;
  }
  .cat-chip .k{font-family:'Shippori Mincho',serif; font-size:12px; font-weight:700; display:block; color:var(--ink);}
  .cat-chip .v{font-size:11px; color:var(--ink-soft); margin-top:2px;}

  form.entry{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:6px;
    padding:16px;
    margin-bottom:22px;
    box-shadow:0 2px 6px rgba(43,42,40,0.06);
  }
  form.entry h2{
    font-family:'Shippori Mincho', serif;
    font-size:15px;
    margin:0 0 12px;
    color:var(--ink-soft);
    letter-spacing:0.5px;
  }
  .row{display:flex; gap:10px; margin-bottom:10px;}
  .field{flex:1; display:flex; flex-direction:column;}
  label{font-size:11px; color:var(--ink-soft); margin-bottom:4px;}
  input[type=text], input[type=number]{
    border:1px solid var(--paper-line);
    background:#fff;
    border-radius:4px;
    padding:10px 10px;
    font-size:15px;
    font-family:inherit;
    color:var(--ink);
  }
  input:focus{outline:2px solid var(--indigo); outline-offset:1px;}
  .cat-select{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px;}
  .cat-btn{
    border:1px solid var(--paper-line);
    background:#fff;
    border-radius:4px;
    padding:12px 2px;
    text-align:center;
    cursor:pointer;
    font-size:12px;
    font-weight:500;
    color:var(--ink-soft);
  }
  .cat-btn.active{border-color:var(--hanko); background:#FBEFEA; color:var(--hanko); font-weight:700;}

  .pay-select{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px;}
  .pay-btn{
    border:1px solid var(--paper-line);
    background:#fff;
    border-radius:4px;
    padding:10px 2px;
    text-align:center;
    cursor:pointer;
    font-size:12px;
    font-weight:500;
    color:var(--ink-soft);
  }
  .pay-btn.active{border-color:var(--indigo); background:#EAF0F2; color:var(--indigo); font-weight:700;}
  button.save{
    width:100%;
    background:var(--indigo);
    color:var(--paper);
    border:none;
    border-radius:4px;
    padding:13px;
    font-size:15px;
    font-weight:700;
    font-family:'Zen Kaku Gothic New', sans-serif;
    cursor:pointer;
  }
  button.save:active{opacity:0.85;}

  .list h2{
    font-family:'Shippori Mincho', serif;
    font-size:15px;
    color:var(--ink-soft);
    margin:0 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .month-nav{display:flex; gap:8px; align-items:center;}
  .month-nav button{
    background:none; border:1px solid var(--paper-line); border-radius:4px;
    width:28px; height:28px; font-size:14px; color:var(--ink-soft); cursor:pointer;
  }
  .entry-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:4px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .entry-row .info{display:flex; flex-direction:column;}
  .entry-row .cat-tag{font-size:11px; color:var(--sage); margin-bottom:2px;}
  .entry-row .desc{font-size:14px;}
  .entry-row .date{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .entry-row .amount{font-family:'Shippori Mincho', serif; font-weight:700; font-size:16px;}
  .entry-row .del{
    background:none; border:none; color:var(--ink-soft); font-size:18px; margin-left:10px; cursor:pointer; padding:2px 6px;
  }
  .empty{
    text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:13px;
  }
  .empty .k{font-family:'Shippori Mincho',serif; font-size:20px; display:block; margin-bottom:6px; color:var(--paper-line);
    -webkit-text-stroke: 1px var(--ink-soft);
  }
</style>
</head>
<body>
<header>
  <h1>Kakeibo</h1>
  <div class="sub">o caderno de contas que ensina a poupar</div>
</header>

<div class="wrap">
  <div class="summary">
    <div class="sum-card">
      <div class="label">Hoje</div>
      <div class="value" id="todayTotal">R$ 0</div>
    </div>
    <div class="sum-card">
      <div class="label" id="monthLabel">Julho</div>
      <div class="value" id="monthCount">0 lanç.</div>
    </div>
    <div class="sum-card total">
      <div class="label">Total do mês</div>
      <div class="value" id="monthTotal">R$ 0,00</div>
    </div>
  </div>

  <div class="cats" id="catSummary"></div>

  <form class="entry" id="entryForm">
    <h2>Novo lançamento</h2>
    <div class="row">
      <div class="field">
        <label for="amount">Valor (R$)</label>
        <input type="number" id="amount" step="0.01" min="0" inputmode="decimal" placeholder="0,00" required>
      </div>
      <div class="field">
        <label for="local">Onde foi gasto</label>
        <input type="text" id="local" placeholder="ex: mercado, posto, ifood...">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="desc">Descrição (opcional)</label>
        <input type="text" id="desc" placeholder="detalhes do gasto">
      </div>
    </div>

    <label style="margin-bottom:6px; display:block;">Categoria</label>
    <div class="cat-select" id="catSelect">
      <div class="cat-btn" data-cat="necessidade">Necessidade</div>
      <div class="cat-btn" data-cat="desejo">Desejo</div>
      <div class="cat-btn" data-cat="cultura">Cultura</div>
      <div class="cat-btn" data-cat="imprevisto">Imprevisto</div>
    </div>

    <label style="margin-bottom:6px; display:block;">Forma de pagamento</label>
    <div class="pay-select" id="paySelect">
      <div class="pay-btn" data-pay="VR">VR</div>
      <div class="pay-btn" data-pay="Crédito">Crédito</div>
      <div class="pay-btn" data-pay="Débito">Débito</div>
      <div class="pay-btn" data-pay="Pix">Pix</div>
    </div>

    <button type="submit" class="save">Registrar gasto</button>
  </form>

  <div class="list">
    <h2>
      <span>Lançamentos</span>
      <div class="month-nav">
        <button type="button" id="prevMonth">‹</button>
        <button type="button" id="nextMonth">›</button>
      </div>
    </h2>
    <div id="entriesList"></div>
  </div>
</div>

<script>
const CAT_LABELS = {
  necessidade: {n:'Necessidade'},
  desejo: {n:'Desejo'},
  cultura: {n:'Cultura'},
  imprevisto: {n:'Imprevisto'}
};
const PAY_METHODS = ['VR','Crédito','Débito','Pix'];
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let selectedCat = 'necessidade';
let selectedPay = 'Pix';
let viewDate = new Date();
let entries = [];

function monthKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtMoney(v){
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

async function loadMonth(){
  const key = `entries:${monthKey(viewDate)}`;
  try{
    const raw = localStorage.getItem(key);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){
    entries = [];
  }
  render();
}

async function saveMonth(){
  const key = `entries:${monthKey(viewDate)}`;
  try{
    localStorage.setItem(key, JSON.stringify(entries));
  }catch(e){
    console.error('Erro ao salvar', e);
  }
}

function render(){
  document.getElementById('monthLabel').textContent = `${MONTH_NAMES[viewDate.getMonth()]}`;
  document.getElementById('monthCount').textContent = `${entries.length} lanç.`;

  const total = entries.reduce((s,e)=>s+e.amount,0);
  document.getElementById('monthTotal').textContent = fmtMoney(total);

  const todayISO = new Date().toISOString().slice(0,10);
  const todayTotal = entries.filter(e=>e.date.slice(0,10)===todayISO).reduce((s,e)=>s+e.amount,0);
  document.getElementById('todayTotal').textContent = fmtMoney(todayTotal);

  const catSummary = document.getElementById('catSummary');
  catSummary.innerHTML = '';
  for(const cat in CAT_LABELS){
    const sum = entries.filter(e=>e.cat===cat).reduce((s,e)=>s+e.amount,0);
    const div = document.createElement('div');
    div.className = 'cat-chip';
    div.innerHTML = `<span class="k">${CAT_LABELS[cat].n}</span><span class="v">${fmtMoney(sum)}</span>`;
    catSummary.appendChild(div);
  }

  const list = document.getElementById('entriesList');
  list.innerHTML = '';
  if(entries.length === 0){
    list.innerHTML = `<div class="empty">Nenhum gasto registrado neste mês ainda.</div>`;
    return;
  }
  const sorted = [...entries].sort((a,b)=> new Date(b.date) - new Date(a.date));
  for(const e of sorted){
    const row = document.createElement('div');
    row.className = 'entry-row';
    row.innerHTML = `
      <div class="info">
        <span class="cat-tag">${CAT_LABELS[e.cat].n} · ${e.pay || '-'}</span>
        <span class="desc">${e.local || '(sem local)'}${e.desc ? ' — ' + e.desc : ''}</span>
        <span class="date">${fmtDate(e.date)}</span>
      </div>
      <div style="display:flex;align-items:center;">
        <span class="amount">${fmtMoney(e.amount)}</span>
        <button class="del" data-id="${e.id}">×</button>
      </div>`;
    list.appendChild(row);
  }
  list.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      entries = entries.filter(e=>e.id !== btn.dataset.id);
      await saveMonth();
      render();
    });
  });
}

document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedCat = btn.dataset.cat;
  });
});
document.querySelector(`.cat-btn[data-cat="${selectedCat}"]`).classList.add('active');

document.querySelectorAll('.pay-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedPay = btn.dataset.pay;
  });
});
document.querySelector(`.pay-btn[data-pay="${selectedPay}"]`).classList.add('active');

document.getElementById('entryForm').addEventListener('submit', async (ev)=>{
  ev.preventDefault();
  const amountInput = document.getElementById('amount');
  const localInput = document.getElementById('local');
  const descInput = document.getElementById('desc');
  const amount = parseFloat(amountInput.value);
  if(!amount || amount <= 0) return;

  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    amount,
    local: localInput.value.trim(),
    desc: descInput.value.trim(),
    cat: selectedCat,
    pay: selectedPay,
    date: new Date().toISOString()
  };
  entries.push(entry);
  await saveMonth();
  amountInput.value = '';
  localInput.value = '';
  descInput.value = '';
  render();
});

document.getElementById('prevMonth').addEventListener('click', ()=>{
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1);
  loadMonth();
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);
  loadMonth();
});

loadMonth();
</script>
</body>
</html>
